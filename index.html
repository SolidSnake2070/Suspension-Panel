<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MX Suspension Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>MX Hub</h2>

      <nav>
        <button class="active">Suspension</button>
        <button>Garage</button>
        <button>Tools</button>
      </nav>

      <div class="active-bike">
        <p>Aktives Bike</p>
        <strong id="activeBike">KX250F</strong>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <header>
        <h1>Suspension Tool</h1>
      </header>

      <!-- BIKE -->
      <section class="card">
        <h3>Bike Auswahl</h3>

        <div class="bike-row" id="bikeList"></div>

        <div class="add-bike">
          <input id="newBike" placeholder="Neues Bike">
          <button onclick="addBike()">+</button>
        </div>
      </section>

      <!-- SETUP -->
      <section class="card">
        <h3>Setup</h3>

        <label>Strecke</label>
        <input id="track">

        <label>Gabel Compression</label>
        <input type="range" id="forkComp" min="0" max="22">

        <label>Gabel Rebound</label>
        <input type="range" id="forkReb" min="0" max="22">

        <label>Dämpfer Low</label>
        <input type="range" id="shockLow" min="0" max="22">

        <label>Dämpfer Rebound</label>
        <input type="range" id="shockReb" min="0" max="22">

        <button onclick="saveSetup()">Setup speichern</button>
      </section>

      <!-- ANALYSE -->
      <section class="card">
        <h3>Analyse</h3>

        <div class="diagram">
          <div id="point"></div>
        </div>

        <p id="analysisText"></p>
      </section>

      <!-- SETUPS -->
      <section class="card">
        <h3>Gespeicherte Setups</h3>
        <div id="setupList"></div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
