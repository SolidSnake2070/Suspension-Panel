<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MX Suspension Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">MX Setup Manager</p>
        <h1>Suspension Tool</h1>
      </div>

      <div class="topbar-actions">
        <button id="exportBtn" class="btn btn-secondary">Export</button>
        <label class="btn btn-secondary file-btn">
          Import
          <input id="importInput" type="file" accept=".json" hidden />
        </label>
        <button id="resetBtn" class="btn btn-danger">Reset</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2>Bikes</h2>
          <p>Wähle dein Motorrad</p>
        </div>
        <div id="bikeGrid" class="bike-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Aktives Setup</h2>
          <p>Kompakte Übersicht des aktuell gesetzten Setups</p>
        </div>
        <div id="activeSetupCard" class="active-setup-card empty-state">
          Bitte zuerst ein Bike auswählen.
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Strecken-Setup</h2>
          <p>Bike → Strecke → Bedingung</p>
        </div>

        <div class="toolbar-grid">
          <div class="field">
            <label for="trackSelect">Strecke</label>
            <select id="trackSelect"></select>
          </div>

          <div class="field">
            <label for="setupSelect">Variante / Bedingung</label>
            <select id="setupSelect"></select>
          </div>

          <div class="toolbar-actions">
            <button id="newTrackBtn" class="btn btn-secondary">Neue Strecke</button>
            <button id="newSetupBtn" class="btn btn-secondary">Neue Variante</button>
            <button id="duplicateSetupBtn" class="btn btn-secondary">Duplizieren</button>
            <button id="setActiveBtn" class="btn btn-primary">Als aktiv setzen</button>
          </div>
        </div>

        <div id="editorWrap" class="editor-wrap hidden">
          <div class="editor-grid">
            <section class="card">
              <div class="card-header">
                <h3>Streckendaten</h3>
              </div>

              <div class="field">
                <label for="trackName">Streckenname</label>
                <input id="trackName" type="text" placeholder="z. B. Süpplingen" />
              </div>

              <div class="field">
                <label for="trackSurface">Untergrund</label>
                <select id="trackSurface">
                  <option value="Hartboden">Hartboden</option>
                  <option value="Sand">Sand</option>
                  <option value="Gemischt">Gemischt</option>
                  <option value="Lehm">Lehm</option>
                  <option value="Sonstiges">Sonstiges</option>
                </select>
              </div>

              <div class="field">
                <label for="trackConditionsNote">Streckentyp / Beschreibung</label>
                <input id="trackConditionsNote" type="text" placeholder="z. B. Hartboden und Sand" />
              </div>

              <div class="field">
                <label for="trackNotes">Streckennotiz</label>
                <textarea id="trackNotes" rows="4" placeholder="Infos zur Strecke, Umbauten, Besonderheiten ..."></textarea>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h3>Setup</h3>
              </div>

              <div class="field">
                <label for="setupLabel">Bezeichnung</label>
                <input id="setupLabel" type="text" placeholder="z. B. Trocken" />
              </div>

              <div class="field">
                <label for="setupWeather">Bedingung / Wetter</label>
                <select id="setupWeather">
                  <option value="Trocken">Trocken</option>
                  <option value="Nass">Nass</option>
                  <option value="Matschig">Matschig</option>
                  <option value="Ausgefahren">Ausgefahren</option>
                  <option value="Tiefer Sand">Tiefer Sand</option>
                  <option value="Hart / Schnell">Hart / Schnell</option>
                </select>
              </div>

              <div class="field">
                <label for="setupTerrain">Passender Untergrund</label>
                <input id="setupTerrain" type="text" placeholder="z. B. Hartboden und Sand" />
              </div>

              <div class="field">
                <label for="setupNotes">Notizen</label>
                <textarea id="setupNotes" rows="4" placeholder="Fahrgefühl, Änderungen, Hinweise ..."></textarea>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h3>Gabel</h3>
              </div>

              <div class="field-inline">
                <div class="field">
                  <label for="frontCompression">Druckstufe</label>
                  <input id="frontCompression" type="number" step="1" />
                </div>
                <div class="field">
                  <label for="frontRebound">Zugstufe</label>
                  <input id="frontRebound" type="number" step="1" />
                </div>
              </div>

              <div class="field">
                <label for="forkAirPressure">Gabel-Luftdruck</label>
                <input id="forkAirPressure" type="number" step="0.1" placeholder="z. B. 8.6" />
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h3>Federbein</h3>
              </div>

              <div class="field-inline">
                <div class="field">
                  <label for="rearLowSpeed">Low Speed</label>
                  <input id="rearLowSpeed" type="number" step="1" />
                </div>

                <div class="field">
                  <label for="rearHighSpeed">High Speed</label>
                  <select id="rearHighSpeed">
                    <option value="n.v.">n.v.</option>
                    <option value="0.5">0.5</option>
                    <option value="0.75">0.75</option>
                    <option value="1">1</option>
                    <option value="1.25">1.25</option>
                    <option value="1.5">1.5</option>
                    <option value="1.75">1.75</option>
                    <option value="2">2</option>
                    <option value="2.25">2.25</option>
                    <option value="2.5">2.5</option>
                    <option value="2.75">2.75</option>
                    <option value="3">3</option>
                  </select>
                </div>
              </div>

              <div class="field-inline">
                <div class="field">
                  <label for="rearRebound">Zugstufe</label>
                  <input id="rearRebound" type="number" step="1" />
                </div>
                <div class="field">
                  <label for="rearSag">Sag / Vorspannung</label>
                  <input id="rearSag" type="number" step="1" placeholder="z. B. 103" />
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h3>Reifenluftdruck</h3>
              </div>

              <div class="field-inline">
                <div class="field">
                  <label for="tireFrontPressure">Reifen vorne (bar)</label>
                  <input id="tireFrontPressure" type="number" step="0.01" />
                </div>
                <div class="field">
                  <label for="tireRearPressure">Reifen hinten (bar)</label>
                  <input id="tireRearPressure" type="number" step="0.01" />
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h3>Analyse</h3>
                <p class="muted">Kompakt und praxisnah</p>
              </div>

              <div id="analysisTags" class="analysis-tags"></div>
              <div id="analysisText" class="analysis-text"></div>
            </section>
          </div>

          <div class="editor-actions">
            <button id="saveBtn" class="btn btn-primary">Speichern</button>
            <button id="deleteSetupBtn" class="btn btn-danger">Variante löschen</button>
            <button id="deleteTrackBtn" class="btn btn-danger">Strecke löschen</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
