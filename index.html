<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MX Tool – Suspension</title>

  <meta name="theme-color" content="#0b1220" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app-shell">

    <!-- 🔷 TOPBAR -->
    <header class="topbar">

      <!-- Titelbereich -->
      <div>
        <p class="eyebrow">MX Setup Manager</p>
        <h1>Suspension Tool</h1>
      </div>

      <!-- Rechte Seite -->
      <div class="topbar-actions">

        <!-- 🔗 MX HUB NAV -->
        <div class="tool-nav">
          <span class="tool-nav-label">MX Hub</span>

          <div class="tool-nav-links">
            <a href="https://solidsnake2070.github.io/Suspension-Panel/" class="tool-nav-link active">
              Suspension
            </a>

            <a href="https://solidsnake2070.github.io/Garage-Tool/" class="tool-nav-link">
              Garage
            </a>
          </div>
        </div>

        <!-- Aktionen -->
        <button id="exportBtn" class="btn btn-secondary" type="button">
          Export
        </button>

        <label class="btn btn-secondary file-btn">
          Import
          <input id="importInput" type="file" accept=".json" hidden />
        </label>

        <button id="resetBtn" class="btn btn-danger" type="button">
          Reset
        </button>

      </div>
    </header>

    <!-- 🔷 MAIN -->
    <main class="layout">

      <!-- 🏍 Bikes -->
      <section class="panel">
        <div class="panel-header">
          <h2>Bikes</h2>
          <p>Wähle dein Motorrad</p>
        </div>

        <div class="bike-actions">
          <button id="newBikeBtn" class="btn btn-secondary">Neues Bike</button>
          <button id="editBikeBtn" class="btn btn-secondary">Bike bearbeiten</button>
          <button id="deleteBikeBtn" class="btn btn-danger">Bike löschen</button>
        </div>

        <div id="bikeGrid" class="bike-grid"></div>
      </section>

      <!-- 📊 Aktives Setup -->
      <section class="panel">
        <div class="panel-header">
          <h2>Aktives Setup</h2>
          <p>Kompakte Übersicht</p>
        </div>

        <div id="activeSetupCard" class="active-setup-card empty-state">
          Bitte zuerst ein Bike auswählen.
        </div>
      </section>

      <!-- ⚙️ Editor -->
      <section class="panel">

        <div class="panel-header">
          <h2>Strecken-Setup</h2>
          <p>Bike → Strecke → Variante</p>
        </div>

        <!-- Auswahl -->
        <div class="toolbar-grid">

          <div class="field">
            <label for="trackSelect">Strecke</label>
            <select id="trackSelect"></select>
          </div>

          <div class="field">
            <label for="setupSelect">Variante</label>
            <select id="setupSelect"></select>
          </div>

          <div class="toolbar-actions">
            <button id="newTrackBtn" class="btn btn-secondary">Neue Strecke</button>
            <button id="newSetupBtn" class="btn btn-secondary">Neue Variante</button>
            <button id="duplicateSetupBtn" class="btn btn-secondary">Duplizieren</button>
          </div>

        </div>

        <!-- Editor -->
        <div id="editorWrap" class="editor-wrap hidden">

          <div class="editor-grid">

            <!-- Strecke -->
            <section class="card">
              <h3>Streckendaten</h3>

              <div class="field">
                <label>Streckenname</label>
                <input id="trackName" type="text" />
              </div>

              <div class="field">
                <label>Untergrund</label>
                <select id="trackSurface"></select>
              </div>

              <div class="field">
                <label>Beschreibung</label>
                <input id="trackConditionsNote" type="text" />
              </div>

              <div class="field">
                <label>Notizen</label>
                <textarea id="trackNotes"></textarea>
              </div>
            </section>

            <!-- Setup -->
            <section class="card">
              <h3>Setup</h3>

              <div class="field">
                <label>Name</label>
                <input id="setupLabel" type="text" />
              </div>

              <div class="field">
                <label>Wetter</label>
                <select id="setupWeather"></select>
              </div>

              <div class="field">
                <label>Terrain</label>
                <input id="setupTerrain" type="text" />
              </div>

              <div class="field">
                <label>Notizen</label>
                <textarea id="setupNotes"></textarea>
              </div>
            </section>

            <!-- Gabel -->
            <section class="card">
              <h3>Gabel</h3>

              <input id="frontCompression" placeholder="Druckstufe" />
              <input id="frontRebound" placeholder="Zugstufe" />
              <input id="forkAirPressure" placeholder="Luftdruck" />
            </section>

            <!-- Federbein -->
            <section class="card">
              <h3>Federbein</h3>

              <input id="rearLowSpeed" placeholder="Low Speed" />
              <select id="rearHighSpeed"></select>
              <input id="rearRebound" placeholder="Zugstufe" />
              <input id="rearSag" placeholder="Sag" />
            </section>

            <!-- Reifen -->
            <section class="card">
              <h3>Reifen</h3>

              <input id="tireFrontPressure" placeholder="Vorne" />
              <input id="tireRearPressure" placeholder="Hinten" />
            </section>

            <!-- Analyse -->
            <section class="card">
              <h3>Analyse</h3>

              <div id="analysisTags"></div>
              <div id="analysisText"></div>
            </section>

          </div>

          <!-- Aktionen -->
          <div class="editor-actions">
            <button id="setActiveBtn" class="btn btn-primary">
              Als aktiv setzen
            </button>

            <button id="deleteSetupBtn" class="btn btn-danger">
              Variante löschen
            </button>

            <button id="deleteTrackBtn" class="btn btn-danger">
              Strecke löschen
            </button>
          </div>

        </div>

      </section>

    </main>

  </div>

  <script src="./app.js"></script>
</body>
</html>
